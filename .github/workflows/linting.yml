name: .v/.sv Linting

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Run Verilator Strict Lint
        run: |
          echo "Running per-file Verilator strict lint..."
          status=0

          # Find all RTL.v and RTL.sv files under SRC
          find SRC -type f \( -name "*.v" -o -name "*.sv" \) | while read -r file; do
            echo "FILE=<$file>"
            printf 'QUOTED=%q\n' "$file"

            verilator --lint-only "$file"
          done

          exit $status
